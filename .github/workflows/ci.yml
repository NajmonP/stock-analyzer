name: CI

# The workflow runs on push or pull request to the master branch.
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # The first job verifies that the project can be compiled and that tests pass.
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      # Checks out the repository source code into the GitHub runner.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Sets up JDK 26 and enables Maven dependency caching.
      - name: Set up JDK 26
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: '26'
          cache: maven

      # Makes the Maven wrapper executable.
      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      # Compiles the project and runs Maven verification, including tests.
      - name: Build with Maven
        run: ./mvnw clean verify

  # The second job verifies that the application Docker image can be built.
  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      # Checks out the repository again because each job runs in a clean environment.
      - name: Checkout repository
        uses: actions/checkout@v4

      # Builds the Docker image using the Dockerfile.
      - name: Build Docker image
        run: docker build -t stock-analyzer:ci .