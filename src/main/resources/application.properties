spring.application.name=stock-analyzer

spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

fmp.api-key=${FMP_API_KEY}
fmp.base-url=https://financialmodelingprep.com/stable

stock.refresh.market-days-cron=0 20 23 * * *
stock.refresh.stock-data-cron=0 25 23 * * *
stock.refresh.zone=Europe/Prague
stock.refresh.stock-data-limit=100