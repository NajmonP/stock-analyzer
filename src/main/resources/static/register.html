<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Stock Analyzer</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="auth-page">
<main class="auth-card">
    <a class="brand brand-centered" href="/">Stock Analyzer</a>

    <div class="auth-heading">
        <p class="eyebrow">Create account</p>
        <h1>Register</h1>
        <p>Create an account to manage your watchlists.</p>
    </div>

    <div id="alert" class="alert hidden" role="alert"></div>

    <form id="register-form" class="form-stack">
        <label>
            Username
            <input
                id="username"
                name="username"
                type="text"
                minlength="3"
                maxlength="30"
                autocomplete="username"
                required
            >
        </label>

        <label>
            Email
            <input
                id="email"
                name="email"
                type="email"
                autocomplete="email"
                required
            >
        </label>

        <label>
            Password
            <input
                id="password"
                name="password"
                type="password"
                minlength="8"
                maxlength="72"
                autocomplete="new-password"
                required
            >
        </label>

        <label>
            Confirm password
            <input
                id="password-confirmation"
                name="passwordConfirmation"
                type="password"
                minlength="8"
                maxlength="72"
                autocomplete="new-password"
                required
            >
        </label>

        <button id="submit-button" class="button button-primary button-full" type="submit">
            Create account
        </button>
    </form>

    <p class="auth-switch">
        Already registered?
        <a href="/login.html">Sign in</a>
    </p>
</main>

<script type="module" src="/js/register.js"></script>
</body>
</html>
